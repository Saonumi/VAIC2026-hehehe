# 4-store stack per master spec: PostgreSQL + OpenSearch + Neo4j + local FS.
# Security plugins are disabled on OpenSearch/Neo4j for demo simplicity only.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vaic
      POSTGRES_PASSWORD: vaic
      POSTGRES_DB: vaic
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaic"]
      interval: 5s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ports: ["9200:9200"]
    volumes: ["os_data:/usr/share/opensearch/data"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5.18
    environment:
      NEO4J_AUTH: neo4j/vaic_neo4j
      NEO4J_PLUGINS: '["apoc"]'
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4j_data:/data"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build: .
    env_file: .env
    environment:
      - POSTGRES_DSN=postgresql+psycopg://vaic:vaic@postgres:5432/vaic
      - OPENSEARCH_HOST=opensearch
      - NEO4J_URI=bolt://neo4j:7687
      - PYTHONPATH=/app
    ports: ["8000:8000"]
    volumes: ["./data:/app/data"]
    depends_on:
      postgres: { condition: service_healthy }
      opensearch: { condition: service_healthy }
      neo4j: { condition: service_healthy }
    command: uvicorn backend.app.api.main:app --host 0.0.0.0 --port 8000

  # Frontend = frontend/nextjs_app (the single UI, spec 2-tab). It is NOT built by
  # compose: it deploys via its own frontend/nextjs_app/railway.json (Railpack) and
  # runs locally with `cd frontend/nextjs_app && pnpm install && pnpm dev` on :3000,
  # talking to this api over http://localhost:8000 (set NEXT_PUBLIC_API_URL to
  # override). Bring up the datastores + api here, run the UI separately.

volumes:
  pg_data:
  os_data:
  neo4j_data:
